name: Backend On-Prem

on:
  workflow_call:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

env:
  MOON_VERSION: "2.0.4"

jobs:
  build-backend-on-premises:
    name: Native Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java-version:
          - "21"
        include:
          - os: ubuntu-latest
            executable-suffix: ""
          - os: windows-latest
            executable-suffix: ".exe"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Set up GraalVM (Java ${{ matrix.java-version }})
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          version: "23.1.2"
          java-version: ${{ matrix.java-version }}
          components: native-image
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        working-directory: packages/backend
        run: chmod +x gradlew

      - name: Compute executable name
        id: executable
        run: echo "name=hollybike-${{ runner.os }}-${{ inputs.version }}-x86_64" >> "$GITHUB_OUTPUT"

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: HollyBike-Frontend-${{ inputs.version }}
          path: packages/backend/src/main/resources/front

      - name: Build native executable
        env:
          IMAGE_NAME: ${{ steps.executable.outputs.name }}
        run: bunx @moonrepo/cli@${{ env.MOON_VERSION }} run backend:package-on-prem

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: HollyBike-${{ inputs.version }}-Backend-${{ runner.os }}
          path: packages/backend/build/native/nativeCompile/${{ steps.executable.outputs.name }}${{ matrix.executable-suffix }}
          retention-days: 1
          if-no-files-found: error

      - name: Fail fast - cancel workflow run
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X POST "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"


