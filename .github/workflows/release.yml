name: Release & Deploy

run-name: >
  Release v${{ inputs.version }}
  ${{ inputs.create-executables && '(production only)' || '' }}
  by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: v1.2.3)"
        required: true
        type: string
      create-executables:
        description: "Build release executables (APK + on-prem binaries)"
        required: false
        type: boolean
        default: false
      play_changes_not_sent_for_review:
        description: "Set true when Play Console requires changesNotSentForReview"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  CI: true

permissions:
  actions: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  cancel-on-failure:
    name: Cancel On Failure
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Watch and cancel run on first failure
        run: |
          set -euo pipefail
          while true; do
            data="$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100")"

            failed="$(echo "$data" | jq '[.jobs[] | select(.name != "Cancel On Failure" and .conclusion == "failure")] | length')"
            if [ "$failed" -gt 0 ]; then
              echo "Detected failing job. Cancelling workflow run ${RUN_ID}."
              gh api -X POST "/repos/${REPO}/actions/runs/${RUN_ID}/cancel"
              exit 0
            fi

            active="$(echo "$data" | jq '[.jobs[] | select(.name != "Cancel On Failure" and .status != "completed")] | length')"
            if [ "$active" -eq 0 ]; then
              echo "All jobs completed without failure."
              exit 0
            fi

            sleep 10
          done

  build-frontend-backend:
    name: Frontend + Backend
    uses: ./.github/workflows/backend-frontend.yml
    with:
      version: ${{ inputs.version }}
      create-executables: ${{ inputs.create-executables }}
    secrets:
      SCW_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY_ID }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}
      MINIO_USERNAME: ${{ secrets.MINIO_USERNAME }}
      MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      BACKEND_SECUTIRY_SECRET: ${{ secrets.BACKEND_SECUTIRY_SECRET }}
      FIREBASE_ADMIN_CREDENTIALS_JSON: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_JSON }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

  build-app:
    name: Android App
    uses: ./.github/workflows/app.yml
    with:
      version: ${{ inputs.version }}
      create-executables: ${{ inputs.create-executables }}
      play_changes_not_sent_for_review: ${{ inputs.play_changes_not_sent_for_review }}
      deploy-to-play: false
    secrets:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
      PRODUCTION_CREDENTIAL_FILE: ${{ secrets.PRODUCTION_CREDENTIAL_FILE }}
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs:
      - build-app
      - build-frontend-backend
    outputs:
      notes: ${{ steps.changelog-output.outputs.notes }}
    env:
      VERSION: ${{ inputs.version }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes with OpenAI
        id: changelog
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          ./.github/scripts/generate-release-notes.sh "${VERSION}" "RELEASE_NOTES.md"

      - name: Export changelog output
        id: changelog-output
        run: |
          {
            echo "notes<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload generated release notes artifact
        uses: actions/upload-artifact@v6
        with:
          name: HollyBike-${{ inputs.version }}-ReleaseNotes
          path: RELEASE_NOTES.md
          retention-days: 1

  deploy-app:
    name: Deploy Android App
    runs-on: ubuntu-latest
    needs:
      - build-app
      - generate-changelog
    permissions:
      contents: read
    env:
      AAB_PATH: packages/app/hollybike-Android-${{ inputs.version }}.aab
      SERVICE_ACCOUNT_PATH: store_credentials.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download AAB artifact
        uses: actions/download-artifact@v7
        with:
          name: HollyBike-${{ inputs.version }}-Android-AAB
          path: packages/app

      - name: Decode service account file
        run: echo "${{ secrets.PRODUCTION_CREDENTIAL_FILE }}" | base64 --decode > "${{ env.SERVICE_ACCOUNT_PATH }}"

      - name: Write Play Store release notes
        run: |
          mkdir -p packages/app/whatsnew/en-US
          cat > packages/app/whatsnew/en-US/default.txt <<'EOF'
          ${{ needs.generate-changelog.outputs.notes }}
          EOF

      - name: Deploy to Play Store (internal testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.SERVICE_ACCOUNT_PATH }}
          packageName: com.hollybike.hollybike
          releaseFiles: ${{ env.AAB_PATH }}
          whatsNewDirectory: packages/app/whatsnew
          track: internal
          status: draft
          changesNotSentForReview: ${{ inputs.play_changes_not_sent_for_review }}

  update-image-descriptions:
    name: Update Docker Image Descriptions
    runs-on: ubuntu-latest
    needs:
      - build-frontend-backend
      - generate-changelog
    permissions:
      packages: write
      contents: read
    env:
      VERSION: ${{ inputs.version }}
      REGISTRY: ghcr.io
      FRONTEND_IMAGE: ${{ github.repository }}-frontend
      BACKEND_IMAGE: ${{ github.repository }}-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release notes file
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ${{ needs.generate-changelog.outputs.notes }}
          EOF

      - name: Apply OCI description annotations
        run: |
          FRONTEND_IMAGE="$(echo "${FRONTEND_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="$(echo "${BACKEND_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          chmod +x .github/scripts/apply-image-description.sh
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${FRONTEND_IMAGE}:${VERSION}" RELEASE_NOTES.md
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${FRONTEND_IMAGE}:latest" RELEASE_NOTES.md
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${BACKEND_IMAGE}:${VERSION}" RELEASE_NOTES.md
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${BACKEND_IMAGE}:latest" RELEASE_NOTES.md

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-app
      - build-frontend-backend
      - generate-changelog
      - deploy-app
      - update-image-descriptions
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        if: inputs.create-executables
        uses: actions/download-artifact@v7
        with:
          pattern: HollyBike-${{ env.VERSION }}-*
          merge-multiple: true
          path: .

      - name: Write release notes file
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ${{ needs.generate-changelog.outputs.notes }}
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="${GITHUB_REPOSITORY#*/}-${VERSION#v}"
          if [[ "${{ inputs.create-executables }}" == "true" ]]; then
            title="$title (production only)"
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              "hollybike-Android-${VERSION}.apk" \
              "hollybike-Windows-${VERSION}-x86_64.exe" \
              "hollybike-Linux-${VERSION}-x86_64"
          else
              gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md
          fi
