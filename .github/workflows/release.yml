name: Release Pipeline

run-name: >
  Release v${{ inputs.version }}
  ${{ inputs.create-executables && '(production only)' || '' }}
  by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: v1.2.3)"
        required: true
        type: string
      create-executables:
        description: "Build release executables (APK + on-prem binaries)"
        required: false
        type: boolean
        default: false
      play_changes_not_sent_for_review:
        description: "Set true when Play Console requires changesNotSentForReview"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  build-backend:
    name: 1) API Build
    permissions:
      actions: write
      contents: read
      packages: write
    uses: ./.github/workflows/build-backend.yml
    with:
      version: ${{ inputs.version }}

  build-frontend:
    name: 1) Web Build
    permissions:
      actions: write
      contents: read
      packages: write
    uses: ./.github/workflows/build-frontend.yml
    with:
      version: ${{ inputs.version }}
    secrets:
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}

  build-backend-on-premises:
    name: 1) API On-Prem Build
    if: inputs.create-executables
    needs:
      - build-frontend
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/build-backend-on-premises.yml
    with:
      version: ${{ inputs.version }}

  build-app:
    name: 1) Android Build
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/app-build.yml
    with:
      version: ${{ inputs.version }}
      create-executables: ${{ inputs.create-executables }}
    secrets:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}

  generate-changelog:
    name: 2) Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    needs:
      - build-backend
      - build-frontend
      - build-app
    outputs:
      notes: ${{ steps.changelog-output.outputs.notes }}
    env:
      VERSION: ${{ inputs.version }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes with OpenAI
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          ./.github/scripts/generate-release-notes.sh "${VERSION}" "RELEASE_NOTES.md"

      - name: Export changelog output
        id: changelog-output
        run: |
          {
            echo "notes<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload generated release notes artifact
        uses: actions/upload-artifact@v6
        with:
          name: HollyBike-${{ inputs.version }}-ReleaseNotes
          path: RELEASE_NOTES.md
          retention-days: 1

      - name: Request run cancellation
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/actions/workflows/cancel-on-job-failure.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}" \
            -f inputs[run_id]="${{ github.run_id }}"

  deploy-app:
    name: 3) Deploy Android
    permissions:
      actions: write
      contents: read
    needs:
      - build-app
      - generate-changelog
    uses: ./.github/workflows/app-deploy.yml
    with:
      version: ${{ inputs.version }}
      play_changes_not_sent_for_review: ${{ inputs.play_changes_not_sent_for_review }}
      release-notes: ${{ needs.generate-changelog.outputs.notes }}
    secrets:
      PRODUCTION_CREDENTIAL_FILE: ${{ secrets.PRODUCTION_CREDENTIAL_FILE }}

  deploy-infrastructure:
    name: 3) Deploy Terraform
    permissions:
      actions: write
      contents: read
      packages: read
      pull-requests: write
    needs:
      - build-backend
      - build-frontend
    uses: ./.github/workflows/infrastructure.yml
    secrets:
      SCW_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY_ID }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}
      MINIO_USERNAME: ${{ secrets.MINIO_USERNAME }}
      MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      BACKEND_SECUTIRY_SECRET: ${{ secrets.BACKEND_SECUTIRY_SECRET }}
      FIREBASE_ADMIN_CREDENTIALS_JSON: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_JSON }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

  update-image-descriptions:
    name: 4) Update Image Descriptions
    runs-on: ubuntu-latest
    needs:
      - deploy-infrastructure
      - generate-changelog
    permissions:
      actions: write
      packages: write
      contents: read
    env:
      VERSION: ${{ inputs.version }}
      REGISTRY: ghcr.io
      FRONTEND_IMAGE: ${{ github.repository }}-frontend
      BACKEND_IMAGE: ${{ github.repository }}-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release notes file
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ${{ needs.generate-changelog.outputs.notes }}
          EOF

      - name: Apply OCI description annotations
        run: |
          FRONTEND_IMAGE="$(echo "${FRONTEND_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="$(echo "${BACKEND_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          chmod +x .github/scripts/apply-image-description.sh
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${FRONTEND_IMAGE}:${VERSION}" RELEASE_NOTES.md
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${FRONTEND_IMAGE}:latest" RELEASE_NOTES.md
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${BACKEND_IMAGE}:${VERSION}" RELEASE_NOTES.md
          ./.github/scripts/apply-image-description.sh "${REGISTRY}/${BACKEND_IMAGE}:latest" RELEASE_NOTES.md

      - name: Request run cancellation
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/actions/workflows/cancel-on-job-failure.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}" \
            -f inputs[run_id]="${{ github.run_id }}"

  create-release:
    name: 5) Create GitHub Release
    if: >
      always() &&
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success' &&
      needs.build-app.result == 'success' &&
      needs.generate-changelog.result == 'success' &&
      needs.deploy-app.result == 'success' &&
      needs.deploy-infrastructure.result == 'success' &&
      needs.update-image-descriptions.result == 'success' &&
      (needs.build-backend-on-premises.result == 'success' || needs.build-backend-on-premises.result == 'skipped')
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
      - build-app
      - build-backend-on-premises
      - generate-changelog
      - deploy-app
      - deploy-infrastructure
      - update-image-descriptions
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        if: inputs.create-executables
        uses: actions/download-artifact@v7
        with:
          pattern: HollyBike-${{ env.VERSION }}-*
          merge-multiple: true
          path: .

      - name: Write release notes file
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ${{ needs.generate-changelog.outputs.notes }}
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="${GITHUB_REPOSITORY#*/}-${VERSION#v}"
          if [[ "${{ inputs.create-executables }}" == "true" ]]; then
            title="$title (production only)"
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              "hollybike-Android-${VERSION}.apk" \
              "hollybike-Windows-${VERSION}-x86_64.exe" \
              "hollybike-Linux-${VERSION}-x86_64"
          else
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md
          fi
