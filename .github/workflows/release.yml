name: Release Pipeline

run-name: >
  Release v${{ inputs.version }}
  ${{ inputs.create-executables && '(production only)' || '' }}
  by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: v1.2.3)"
        required: true
        type: string
      create-executables:
        description: "Build release executables (APK + on-prem binaries)"
        required: false
        type: boolean
        default: false
      play_changes_not_sent_for_review:
        description: "Set true when Play Console requires changesNotSentForReview"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  generate-image-changelog:
    name: 1) Generate Image Changelog
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      image_notes: ${{ steps.changelog-output.outputs.image_notes }}
    env:
      VERSION: ${{ inputs.version }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes with OpenAI
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          ./.github/scripts/generate-release-notes.sh "${VERSION}" "IMAGE_RELEASE_NOTES.txt" "image"

      - name: Export changelog output
        id: changelog-output
        run: |
          {
            echo "image_notes<<EOF"
            cat IMAGE_RELEASE_NOTES.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Request run cancellation
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/actions/workflows/cancel-on-job-failure.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}" \
            -f inputs[run_id]="${{ github.run_id }}"

  build-backend:
    name: 2) API Build
    needs:
      - generate-image-changelog
    permissions:
      actions: write
      contents: read
      packages: write
    uses: ./.github/workflows/build-backend.yml
    with:
      version: ${{ inputs.version }}
      image_description: ${{ needs.generate-image-changelog.outputs.image_notes }}

  build-frontend:
    name: 2) Web Build
    needs:
      - generate-image-changelog
    permissions:
      actions: write
      contents: read
      packages: write
    uses: ./.github/workflows/build-frontend.yml
    with:
      version: ${{ inputs.version }}
      image_description: ${{ needs.generate-image-changelog.outputs.image_notes }}
    secrets:
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}

  build-backend-on-premises:
    name: 2) API On-Prem Build
    if: inputs.create-executables
    needs:
      - build-frontend
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/build-backend-on-premises.yml
    with:
      version: ${{ inputs.version }}

  build-app:
    name: 2) Android Build
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/app-build.yml
    with:
      version: ${{ inputs.version }}
      create-executables: ${{ inputs.create-executables }}
    secrets:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}

  deploy-app:
    name: 3) Deploy Android
    permissions:
      actions: write
      contents: read
    needs:
      - build-app
    uses: ./.github/workflows/app-deploy.yml
    with:
      version: ${{ inputs.version }}
      play_changes_not_sent_for_review: ${{ inputs.play_changes_not_sent_for_review }}
    secrets:
      PRODUCTION_CREDENTIAL_FILE: ${{ secrets.PRODUCTION_CREDENTIAL_FILE }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  deploy-infrastructure:
    name: 3) Deploy Terraform
    permissions:
      actions: write
      contents: read
      packages: read
      pull-requests: write
    needs:
      - build-backend
      - build-frontend
    uses: ./.github/workflows/infrastructure.yml
    secrets:
      SCW_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY_ID }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}
      MINIO_USERNAME: ${{ secrets.MINIO_USERNAME }}
      MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      BACKEND_SECUTIRY_SECRET: ${{ secrets.BACKEND_SECUTIRY_SECRET }}
      FIREBASE_ADMIN_CREDENTIALS_JSON: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_JSON }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

  generate-release-changelog:
    name: 4) Generate Release Changelog
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    needs:
      - deploy-app
      - deploy-infrastructure
    outputs:
      notes: ${{ steps.changelog-output.outputs.notes }}
    env:
      VERSION: ${{ inputs.version }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes with OpenAI
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          ./.github/scripts/generate-release-notes.sh "${VERSION}" "RELEASE_NOTES.md" "full"

      - name: Export release changelog output
        id: changelog-output
        run: |
          {
            echo "notes<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload generated release notes artifact
        uses: actions/upload-artifact@v7
        with:
          name: HollyBike-${{ inputs.version }}-ReleaseNotes
          path: RELEASE_NOTES.md
          retention-days: 1

      - name: Request run cancellation
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/actions/workflows/cancel-on-job-failure.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}" \
            -f inputs[run_id]="${{ github.run_id }}"

  create-release:
    name: 5) Create GitHub Release
    if: >
      always() &&
      needs.generate-image-changelog.result == 'success' &&
      needs.generate-release-changelog.result == 'success' &&
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success' &&
      needs.build-app.result == 'success' &&
      needs.deploy-app.result == 'success' &&
      needs.deploy-infrastructure.result == 'success' &&
      (needs.build-backend-on-premises.result == 'success' || needs.build-backend-on-premises.result == 'skipped')
    runs-on: ubuntu-latest
    needs:
      - generate-image-changelog
      - generate-release-changelog
      - build-backend
      - build-frontend
      - build-backend-on-premises
      - build-app
      - deploy-app
      - deploy-infrastructure
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        if: inputs.create-executables
        uses: actions/download-artifact@v8
        with:
          pattern: HollyBike-${{ env.VERSION }}-*
          merge-multiple: true
          path: .

      - name: Write release notes file
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ${{ needs.generate-release-changelog.outputs.notes }}
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="${GITHUB_REPOSITORY#*/}-${VERSION#v}"
          if [[ "${{ inputs.create-executables }}" == "true" ]]; then
            title="$title (production only)"
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              "hollybike-Android-${VERSION}.apk" \
              "hollybike-Windows-${VERSION}-x86_64.exe" \
              "hollybike-Linux-${VERSION}-x86_64"
          else
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md
          fi
