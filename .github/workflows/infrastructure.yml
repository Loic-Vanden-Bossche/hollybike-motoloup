name: Infrastructure

on:
  workflow_call:
    inputs:
      externall_call:
        description: "Whether this run is triggered from another workflow"
        required: false
        type: boolean
        default: true
    secrets:
      SCW_ACCESS_KEY_ID:
        description: "Scaleway access key ID"
        required: false
      SCW_SECRET_KEY:
        description: "Scaleway secret key"
        required: false
      MINIO_USERNAME:
        description: "MinIO username"
        required: true
      MINIO_PASSWORD:
        description: "MinIO password"
        required: true
      MAPBOX_PUBLIC_ACCESS_TOKEN:
        description: "Mapbox public token"
        required: true
      DATABASE_USERNAME:
        description: "Database username"
        required: true
      DATABASE_PASSWORD:
        description: "Database password"
        required: true
      BACKEND_SECUTIRY_SECRET:
        description: "Backend security secret"
        required: true
      FIREBASE_ADMIN_CREDENTIALS_JSON:
        description: "Firebase Admin credentials JSON"
        required: false
      KUBE_CONFIG:
        description: "Kubernetes config (base64)"
        required: true
  pull_request:
    branches:
      - main
    paths:
      - "packages/infrastructure/k8s/**"
      - ".github/workflows/infrastructure.yml"
  push:
    branches:
      - main
    paths:
      - "packages/infrastructure/k8s/**"
      - ".github/workflows/infrastructure.yml"

concurrency:
  group: infra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TF_IN_AUTOMATION: true
  MOON_VERSION: "2.0.4"
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  TF_VAR_storage_s3_username: ${{ secrets.MINIO_USERNAME }}
  TF_VAR_storage_s3_password: ${{ secrets.MINIO_PASSWORD }}
  TF_VAR_mapbox_public_access_token_secret: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}
  TF_VAR_database_username: ${{ secrets.DATABASE_USERNAME }}
  TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
  TF_VAR_security_secret: ${{ secrets.BACKEND_SECUTIRY_SECRET }}
  TF_VAR_firebase_admin_credentials_json: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_JSON }}
  TF_VAR_repository_name: ${{ github.repository }}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: self-hosted
    permissions:
      actions: write
      contents: read
      packages: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decode kube config
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

      - name: Set up Node.js for GitHub JavaScript actions
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform format check
        id: fmt
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci infrastructure:lint
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run infrastructure:lint
          fi

      - name: Terraform validate
        id: validate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci infrastructure:validate
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run infrastructure:validate
          fi

      - name: Normalize image names
        id: image-names
        run: |
          echo "frontend=$(echo "${{ env.FRONTEND_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "backend=$(echo "${{ env.BACKEND_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Get latest frontend image tag
        id: frontend-image-version
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x get-latest-tag.sh
          package_name="$(echo "${{ steps.image-names.outputs.frontend }}" | cut -d'/' -f2)"
          echo "tag=$(./get-latest-tag.sh "$package_name")" >> "$GITHUB_OUTPUT"

      - name: Get latest backend image tag
        id: backend-image-version
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x get-latest-tag.sh
          package_name="$(echo "${{ steps.image-names.outputs.backend }}" | cut -d'/' -f2)"
          echo "tag=$(./get-latest-tag.sh "$package_name")" >> "$GITHUB_OUTPUT"

      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          TF_VAR_frontend_image: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.frontend }}:${{ steps.frontend-image-version.outputs.tag }}
          TF_VAR_backend_image: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.backend }}:${{ steps.backend-image-version.outputs.tag }}
        run: |
          set +e
          PLAN_OUTPUT=$(bunx @moonrepo/cli@${{ env.MOON_VERSION }} run infrastructure:plan 2>&1)
          STATUS=$?
          echo "stdout<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PLAN_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $STATUS

      - name: Comment plan on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format: \`${{ steps.fmt.outcome }}\`
            #### Terraform Validate: \`${{ steps.validate.outcome }}\`
            #### Terraform Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Actor: @${{ github.actor }}, Event: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail when Terraform plan fails
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: inputs.externall_call || (github.ref == 'refs/heads/main' && github.event_name == 'push')
        env:
          TF_VAR_frontend_image: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.frontend }}:${{ steps.frontend-image-version.outputs.tag }}
          TF_VAR_backend_image: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.backend }}:${{ steps.backend-image-version.outputs.tag }}
        run: bunx @moonrepo/cli@${{ env.MOON_VERSION }} run infrastructure:deploy




