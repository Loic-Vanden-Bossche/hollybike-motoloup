name: Android App

on:
  workflow_call:
    inputs:
      externall_call:
        description: "Whether this run is triggered from another workflow"
        required: false
        type: boolean
        default: true
      version:
        description: "Release version"
        required: true
        type: string
      create-executables:
        description: "Build APK for release assets"
        required: true
        type: boolean
      play_changes_not_sent_for_review:
        description: "Set true when Play Console requires changesNotSentForReview"
        required: false
        type: boolean
        default: false
      deploy-to-play:
        description: "Deploy AAB to Play Console after build"
        required: false
        type: boolean
        default: true
      release-notes:
        description: "Generated release notes content"
        required: false
        type: string
        default: ""
    secrets:
      ANDROID_KEYSTORE:
        description: "Android keystore (base64)"
        required: true
      ANDROID_KEY_PROPERTIES:
        description: "Android signing properties (base64)"
        required: true
      ANDROID_GOOGLE_SERVICES_JSON:
        description: "Android Firebase google-services.json (base64)"
        required: true
      PRODUCTION_CREDENTIAL_FILE:
        description: "Google Play service account JSON (base64)"
        required: true
      MAPBOX_DOWNLOADS_TOKEN:
        description: "Mapbox downloads token"
        required: true
      MAPBOX_PUBLIC_ACCESS_TOKEN:
        description: "Mapbox public access token"
        required: true

concurrency:
  group: app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  build:
    name: Android Build
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/app-build.yml
    with:
      version: ${{ inputs.version }}
      create-executables: ${{ inputs.create-executables }}
    secrets:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
      MAPBOX_PUBLIC_ACCESS_TOKEN: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}

  deploy:
    name: Play Store Deploy
    if: ${{ inputs.externall_call && inputs['deploy-to-play'] }}
    needs: build
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/app-deploy.yml
    with:
      version: ${{ inputs.version }}
      play_changes_not_sent_for_review: ${{ inputs.play_changes_not_sent_for_review }}
      release-notes: ${{ inputs.release-notes }}
    secrets:
      PRODUCTION_CREDENTIAL_FILE: ${{ secrets.PRODUCTION_CREDENTIAL_FILE }}
