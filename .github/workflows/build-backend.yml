name: Backend CI/CD

on:
  workflow_call:
    inputs:
      externall_call:
        description: "Whether this run is triggered from another workflow"
        required: false
        type: boolean
        default: true
      version:
        description: "Release version"
        required: true
        type: string
  pull_request:
    branches:
      - main
    paths:
      - "packages/backend/**"
      - ".github/workflows/build-backend.yml"

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend
  JAVA_VERSION: "21"
  MOON_VERSION: "2.0.4"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Set up GraalVM (Java ${{ env.JAVA_VERSION }})
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        working-directory: packages/backend
        run: chmod +x gradlew

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci backend:test
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run backend:test
          fi

      - name: Build native executable
        if: inputs.externall_call
        env:
          IMAGE_NAME: hollybike_server
        run: bunx @moonrepo/cli@${{ env.MOON_VERSION }} run backend:package

      - name: Set up Docker Buildx
        if: inputs.externall_call
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: inputs.externall_call
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        if: inputs.externall_call
        env:
          VERSION: ${{ inputs.version }}
          EXECUTABLE: hollybike_server
        run: |
          IMAGE_NAME="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          bunx @moonrepo/cli@${{ env.MOON_VERSION }} run backend:publish
