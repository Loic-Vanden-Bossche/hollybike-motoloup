name: Cancel Parallel On Failure

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID to cancel"
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  cancel-run:
    name: Cancel Target Run
    runs-on: ubuntu-latest
    steps:
      - name: Cancel run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          status="$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}" --jq '.status' || echo "unknown")"
          if [ "${status}" = "in_progress" ] || [ "${status}" = "queued" ]; then
            gh api -X POST "/repos/${{ github.repository }}/actions/runs/${RUN_ID}/cancel"
            echo "Canceled run ${RUN_ID}."
          else
            echo "Run ${RUN_ID} is already ${status}, nothing to cancel."
          fi
