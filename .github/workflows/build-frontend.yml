name: Frontend

on:
  workflow_call:
    inputs:
      externall_call:
        description: "Whether this run is triggered from another workflow"
        required: false
        type: boolean
        default: true
      version:
        description: "Release version"
        required: true
        type: string
      image_description:
        description: "OCI image description"
        required: false
        type: string
        default: ""
    secrets:
      MAPBOX_PUBLIC_ACCESS_TOKEN:
        description: "Mapbox public token"
        required: true
  pull_request:
    branches:
      - main
    paths:
      - "packages/frontend/**"
      - ".github/workflows/build-frontend.yml"

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend
  MOON_VERSION: "2.1.1"

jobs:
  build:
    name: Web Build & Publish
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        working-directory: packages/frontend
        run: bun install --frozen-lockfile

      - name: Run linter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci frontend:lint
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run frontend:lint
          fi

      - name: Build frontend
        env:
          VITE_MAPBOX_KEY: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}
          VITE_BACKEND_BASE_URL: https://api.hollybike.chbrx.com/api
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci frontend:build
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run frontend:build
          fi

      - name: Set up Docker Buildx
        if: inputs.externall_call
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        if: inputs.externall_call
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push container image
        if: inputs.externall_call
        env:
          VERSION: ${{ inputs.version }}
          IMAGE_DESCRIPTION: ${{ inputs.image_description }}
        run: |
          IMAGE_NAME="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          bunx @moonrepo/cli@${{ env.MOON_VERSION }} run frontend:package

      - name: Upload frontend artifact
        if: inputs.externall_call
        uses: actions/upload-artifact@v7
        with:
          name: HollyBike-Frontend-${{ inputs.version }}
          path: packages/frontend/dist
          retention-days: 1
          if-no-files-found: error

      - name: Request run cancellation
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/actions/workflows/cancel-on-job-failure.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}" \
            -f inputs[run_id]="${{ github.run_id }}"



