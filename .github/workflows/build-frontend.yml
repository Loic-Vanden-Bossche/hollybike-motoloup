name: Frontend CI/CD

on:
  workflow_call:
    inputs:
      externall_call:
        description: "Whether this run is triggered from another workflow"
        required: false
        type: boolean
        default: true
      version:
        description: "Release version"
        required: true
        type: string
    secrets:
      MAPBOX_PUBLIC_ACCESS_TOKEN:
        description: "Mapbox public token"
        required: true
  pull_request:
    branches:
      - main
    paths:
      - "packages/frontend/**"
      - ".github/workflows/build-frontend.yml"

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend
  MOON_VERSION: "2.0.4"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        working-directory: packages/frontend
        run: bun install --frozen-lockfile

      - name: Run linter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci frontend:lint
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run frontend:lint
          fi

      - name: Build frontend
        env:
          VITE_MAPBOX_KEY: ${{ secrets.MAPBOX_PUBLIC_ACCESS_TOKEN }}
          VITE_BACKEND_BASE_URL: https://api.hollybike.chbrx.com/api
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} ci frontend:build
          else
            bunx @moonrepo/cli@${{ env.MOON_VERSION }} run frontend:build
          fi

      - name: Set up Docker Buildx
        if: inputs.externall_call
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: inputs.externall_call
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push container image
        if: inputs.externall_call
        env:
          VERSION: ${{ inputs.version }}
        run: bunx @moonrepo/cli@${{ env.MOON_VERSION }} run frontend:package

      - name: Upload frontend artifact
        if: inputs.externall_call
        uses: actions/upload-artifact@v4
        with:
          name: HollyBike-Frontend-${{ inputs.version }}
          path: packages/frontend/dist
          retention-days: 1
          if-no-files-found: error

